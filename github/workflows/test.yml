name: Test Minecraft AI Bot


on:

  push:

    branches:
      - main



jobs:


  test:


    runs-on:
      ubuntu-latest



    steps:


      - name:
          Checkout

        uses:
          actions/checkout@v4



      - name:
          Setup Node

        uses:
          actions/setup-node@v4

        with:

          node-version:
            22



      - name:
          Install packages

        run:

          npm install



      - name:
          Run tests

        run:

          npm test